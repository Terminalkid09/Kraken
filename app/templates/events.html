{% extends "base.html" %}
{% block title %}Events — Kraken{% endblock %}
{% block header %}Attack Events{% endblock %}
{% set active_page = 'events' %}

{% block content %}
<!-- Filters -->
<div class="flex flex-wrap gap-3 mb-5">
    <select id="filter-sensor"
        class="text-sm bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-indigo-500">
        <option value="">All Sensors</option>
        <option value="ssh">SSH</option>
        <option value="http">HTTP</option>
        <option value="ftp">FTP</option>
        <option value="telnet">Telnet</option>
    </select>
    <input id="filter-ip" type="text" placeholder="Filter by IP…"
        class="text-sm bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-lg px-3 py-2 w-48 focus:outline-none focus:ring-2 focus:ring-indigo-500" />
    <button onclick="loadEvents(true)"
        class="text-sm bg-indigo-600 hover:bg-indigo-500 text-white px-4 py-2 rounded-lg font-medium transition-colors">
        Apply
    </button>
    <button onclick="resetFilters()"
        class="text-sm bg-slate-200 dark:bg-slate-700 hover:bg-slate-300 dark:hover:bg-slate-600 px-4 py-2 rounded-lg font-medium transition-colors">
        Reset
    </button>
</div>

<!-- Table -->
<div class="card p-0 overflow-hidden">
    <table class="w-full text-sm">
        <thead class="bg-slate-50 dark:bg-slate-700/50 text-slate-400 uppercase text-xs tracking-wider">
            <tr>
                <th class="px-5 py-3 text-left">Timestamp</th>
                <th class="px-5 py-3 text-left">Attacker IP</th>
                <th class="px-5 py-3 text-left">Sensor</th>
                <th class="px-5 py-3 text-left">Country</th>
                <th class="px-5 py-3 text-left">City</th>
                <th class="px-5 py-3 text-left">Threat</th>
                <th class="px-5 py-3 text-left">Detail</th>
            </tr>
        </thead>
        <tbody id="events-tbody" class="divide-y divide-slate-100 dark:divide-slate-700/50">
            <tr><td colspan="7" class="px-5 py-10 text-center text-slate-400">Loading…</td></tr>
        </tbody>
    </table>
</div>

<!-- Pagination -->
<div class="flex items-center justify-between mt-4">
    <span class="text-sm text-slate-400" id="page-info"></span>
    <div class="flex gap-2">
        <button id="btn-prev" onclick="changePage(-1)"
            class="text-sm px-4 py-2 rounded-lg bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 hover:border-indigo-500 transition-colors disabled:opacity-40 disabled:cursor-not-allowed">
            ← Prev
        </button>
        <button id="btn-next" onclick="changePage(1)"
            class="text-sm px-4 py-2 rounded-lg bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 hover:border-indigo-500 transition-colors disabled:opacity-40 disabled:cursor-not-allowed">
            Next →
        </button>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
requireAuth();
const TOKEN = localStorage.getItem('kraken_token');
const PAGE_SIZE = 50;
let currentPage = 0;

const SENSOR_COLORS = {
    ssh:    'bg-indigo-100 text-indigo-700 dark:bg-indigo-900/50 dark:text-indigo-300',
    http:   'bg-cyan-100 text-cyan-700 dark:bg-cyan-900/50 dark:text-cyan-300',
    ftp:    'bg-amber-100 text-amber-700 dark:bg-amber-900/50 dark:text-amber-300',
    telnet: 'bg-rose-100 text-rose-700 dark:bg-rose-900/50 dark:text-rose-300',
};

function sensorBadge(s) {
    const cls = SENSOR_COLORS[s] || 'bg-slate-100 text-slate-600';
    return `<span class="text-xs font-semibold px-2 py-0.5 rounded-full ${cls}">${s.toUpperCase()}</span>`;
}

async function loadEvents(reset = false) {
    if (reset) currentPage = 0;
    const sensor = document.getElementById('filter-sensor').value;
    const ip     = document.getElementById('filter-ip').value.trim();
    const skip   = currentPage * PAGE_SIZE;

    let url = `/api/v1/events/?skip=${skip}&limit=${PAGE_SIZE}`;
    if (sensor) url += `&sensor_type=${encodeURIComponent(sensor)}`;
    if (ip)     url += `&attacker_ip=${encodeURIComponent(ip)}`;

    const tbody = document.getElementById('events-tbody');
    tbody.innerHTML = '<tr><td colspan="7" class="px-5 py-10 text-center text-slate-400">Loading…</td></tr>';

    try {
        const res = await fetch(url, { headers: { Authorization: `Bearer ${TOKEN}` } });
        if (res.status === 401) { window.location.href = '/login'; return; }
        const events = await res.json();

        if (!events.length) {
            tbody.innerHTML = '<tr><td colspan="7" class="px-5 py-10 text-center text-slate-400">No events found.</td></tr>';
        } else {
            tbody.innerHTML = events.map(e => `
                <tr class="hover:bg-slate-50 dark:hover:bg-slate-700/30 transition-colors">
                    <td class="px-5 py-3 text-xs font-mono text-slate-400">${e.timestamp_start.replace('T',' ').slice(0,19)}</td>
                    <td class="px-5 py-3 font-mono font-semibold text-indigo-500">${e.attacker_ip}</td>
                    <td class="px-5 py-3">${sensorBadge(e.sensor_type)}</td>
                    <td class="px-5 py-3">${e.country || '—'}</td>
                    <td class="px-5 py-3 text-slate-400 text-xs">${e.city || '—'}</td>
                    <td class="px-5 py-3">${e.is_known_threat
                        ? '<span class="text-xs font-semibold text-rose-500">⚠ Known</span>'
                        : '<span class="text-xs text-slate-400">—</span>'}</td>
                    <td class="px-5 py-3">
                        <a href="/api/v1/events/${e.session_id}" target="_blank"
                           class="text-xs text-indigo-400 hover:text-indigo-300 hover:underline">JSON ↗</a>
                    </td>
                </tr>`).join('');
        }

        document.getElementById('page-info').textContent =
            `Page ${currentPage + 1} · ${events.length} events`;
        document.getElementById('btn-prev').disabled = currentPage === 0;
        document.getElementById('btn-next').disabled = events.length < PAGE_SIZE;
    } catch(e) {
        tbody.innerHTML = '<tr><td colspan="7" class="px-5 py-10 text-center text-rose-400">Failed to load events.</td></tr>';
    }
}

function changePage(dir) {
    currentPage = Math.max(0, currentPage + dir);
    loadEvents();
}

function resetFilters() {
    document.getElementById('filter-sensor').value = '';
    document.getElementById('filter-ip').value = '';
    loadEvents(true);
}

loadEvents();
</script>
{% endblock %}
