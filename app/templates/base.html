<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{% block title %}Kraken{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: { extend: { colors: { brand: '#6366f1' } } }
        }
        // Apply persisted theme before paint
        if (localStorage.getItem('theme') !== 'light') {
            document.documentElement.classList.add('dark');
        } else {
            document.documentElement.classList.remove('dark');
        }
    </script>
    <style>
        body { font-family: system-ui, -apple-system, sans-serif; }
        .nav-link { @apply flex items-center gap-3 px-4 py-2.5 rounded-lg text-sm font-medium transition-colors text-slate-300 hover:bg-white/10 hover:text-white; }
        .nav-link.active { @apply bg-indigo-600 text-white; }
        .card { @apply bg-white dark:bg-slate-800 rounded-xl border border-slate-200 dark:border-slate-700 p-5; }
    </style>
</head>
<body class="bg-slate-100 dark:bg-slate-900 text-slate-800 dark:text-slate-100 min-h-screen flex">

    <!-- Sidebar -->
    <aside class="w-60 shrink-0 bg-slate-900 dark:bg-slate-950 flex flex-col py-6 px-3 min-h-screen">
        <div class="flex items-center gap-3 px-3 mb-8">
            <span class="text-3xl">🦑</span>
            <div>
                <div class="font-bold text-white text-lg leading-tight">Kraken</div>
                <div class="text-xs text-slate-500">Honeypot Platform</div>
            </div>
        </div>
        <nav class="flex flex-col gap-1 flex-1">
            <a href="/" class="nav-link {% if active_page == 'dashboard' %}active{% endif %}">
                <svg class="w-4 h-4 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                          d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/>
                </svg>
                Dashboard
            </a>
            <a href="/events" class="nav-link {% if active_page == 'events' %}active{% endif %}">
                <svg class="w-4 h-4 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                          d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/>
                </svg>
                Attack Events
            </a>
            <a href="/api/docs" target="_blank" class="nav-link">
                <svg class="w-4 h-4 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                          d="M10 20l4-16m4 4l4 4-4 4M6 16l-4-4 4-4"/>
                </svg>
                API Docs
            </a>
        </nav>
        <!-- Export shortcuts -->
        <div class="border-t border-white/10 pt-4 px-2 mb-4">
            <p class="text-xs text-slate-500 uppercase tracking-wider px-2 mb-2">Export</p>
            <a href="/api/v1/export/csv"  class="nav-link text-xs">📄 CSV</a>
            <a href="/api/v1/export/json" class="nav-link text-xs">📋 JSON</a>
            <a href="/api/v1/export/pdf"  class="nav-link text-xs">📑 PDF Report</a>
        </div>
        <!-- Theme toggle + logout -->
        <div class="border-t border-white/10 pt-4 px-2 flex flex-col gap-1">
            <button onclick="toggleTheme()"
                    class="nav-link text-xs w-full text-left">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                          d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364-6.364l-.707.707M6.343 17.657l-.707.707M17.657 17.657l-.707-.707M6.343 6.343l-.707-.707M12 8a4 4 0 100 8 4 4 0 000-8z"/>
                </svg>
                Toggle Theme
            </button>
            <button onclick="logout()" class="nav-link text-xs w-full text-left text-rose-400">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                          d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a2 2 0 01-2 2H6a2 2 0 01-2-2V7a2 2 0 012-2h5a2 2 0 012 2v1"/>
                </svg>
                Logout
            </button>
        </div>
    </aside>

    <!-- Main -->
    <main class="flex-1 flex flex-col min-h-screen overflow-auto">
        <header class="bg-white dark:bg-slate-800 border-b border-slate-200 dark:border-slate-700 px-8 py-4 flex items-center justify-between shrink-0">
            <h1 class="font-semibold text-lg">{% block header %}Kraken{% endblock %}</h1>
            <div class="flex items-center gap-2 text-xs text-slate-400">
                <span class="w-2 h-2 rounded-full bg-emerald-500 animate-pulse"></span>
                Live
            </div>
        </header>
        <div class="flex-1 p-8">
            {% block content %}{% endblock %}
        </div>
    </main>

    <script>
        function toggleTheme() {
            const isDark = document.documentElement.classList.toggle('dark');
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
        }
        function logout() {
            localStorage.removeItem('kraken_token');
            window.location.href = '/login';
        }
        function requireAuth() {
            if (!localStorage.getItem('kraken_token')) window.location.href = '/login';
        }
    </script>
    {% block scripts %}{% endblock %}
</body>
</html>
