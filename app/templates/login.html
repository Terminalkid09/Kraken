<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login — Kraken</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { darkMode: 'class' }
        if (localStorage.getItem('theme') !== 'light') {
            document.documentElement.classList.add('dark');
        }
    </script>
</head>
<body class="bg-slate-900 min-h-screen flex items-center justify-center p-4">

    <div class="w-full max-w-sm">
        <div class="text-center mb-8">
            <div class="text-6xl mb-4">🦑</div>
            <h1 class="text-2xl font-bold text-white">Kraken</h1>
            <p class="text-slate-400 text-sm mt-1">Honeypot Intelligence Platform</p>
        </div>

        <div class="bg-slate-800 rounded-2xl border border-slate-700 p-8 shadow-2xl">
            <div id="error-msg"
                 class="hidden mb-5 text-sm text-rose-400 bg-rose-400/10 border border-rose-400/20 rounded-lg px-4 py-3">
            </div>
            <div class="flex flex-col gap-4">
                <div>
                    <label class="block text-xs text-slate-400 mb-1.5 font-medium">Username</label>
                    <input id="username" type="text" autocomplete="username"
                           class="w-full bg-slate-700 border border-slate-600 text-white rounded-lg px-4 py-2.5 text-sm focus:outline-none focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 transition-colors" />
                </div>
                <div>
                    <label class="block text-xs text-slate-400 mb-1.5 font-medium">Password</label>
                    <input id="password" type="password" autocomplete="current-password"
                           class="w-full bg-slate-700 border border-slate-600 text-white rounded-lg px-4 py-2.5 text-sm focus:outline-none focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 transition-colors" />
                </div>
                <button id="login-btn" onclick="doLogin()"
                        class="bg-indigo-600 hover:bg-indigo-500 active:bg-indigo-700 text-white font-semibold rounded-lg py-2.5 text-sm transition-colors mt-1">
                    Sign In
                </button>
            </div>
        </div>
        <p class="text-center text-xs text-slate-600 mt-6">Kraken v1.0.0</p>
    </div>

    <script>
        async function doLogin() {
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            const errorEl = document.getElementById('error-msg');
            const btn     = document.getElementById('login-btn');

            errorEl.classList.add('hidden');
            if (!username || !password) {
                errorEl.textContent = 'Please enter username and password.';
                errorEl.classList.remove('hidden');
                return;
            }

            btn.disabled = true;
            btn.textContent = 'Signing in…';

            try {
                const res = await fetch('/api/v1/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password }),
                });
                if (!res.ok) {
                    const data = await res.json().catch(() => ({}));
                    errorEl.textContent = data.detail || 'Invalid credentials.';
                    errorEl.classList.remove('hidden');
                    return;
                }
                const { access_token } = await res.json();
                localStorage.setItem('kraken_token', access_token);
                window.location.href = '/';
            } catch {
                errorEl.textContent = 'Connection error. Is the server running?';
                errorEl.classList.remove('hidden');
            } finally {
                btn.disabled = false;
                btn.textContent = 'Sign In';
            }
        }

        document.addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
        // Redirect if already logged in
        if (localStorage.getItem('kraken_token')) window.location.href = '/';
    </script>
</body>
</html>
